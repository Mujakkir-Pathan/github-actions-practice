services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - devboard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT}:5432"

  backend:
    build: ./backend
    image: mujakkirpathan/devboard-backend:${IMAGE_TAG:-latest}
    networks:
      - devboard-network
    environment:
      PORT: "${BACKEND_PORT}"
      POSTGRES_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_PORT}"   

  frontend:
    build: ./frontend
    image: mujakkirpathan/devboard-frontend:${IMAGE_TAG:-latest}
    networks:
      - devboard-network
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT}:4173"  
volumes:
  pgdata:

networks:
  devboard-network:
