name: matrix

on:
  workflow_dispatch:

jobs:
  build: 
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: 
          - "3.10"
          - "3.11"
          - "3.12"
        os:
          - "ubuntu-latest"
          - "windows-latest"
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: ${{ matrix.python-version }}  
          
      - name: Display Python version
        run: python --version