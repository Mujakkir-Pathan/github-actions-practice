name: Docker Publish

on: 
    push:
        branches: [main]

jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v4
            
            - name: Build frontend Docker Image
              run: |
                docker build -t frontend-devboard-actions devboard/frontend/.

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }} 
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Get short commit SHA
              run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Tag frontend image
              run: |
                docker tag frontend-devboard-actions mujakkirpathan/devboard-frontend:latest
                docker tag frontend-devboard-actions mujakkirpathan/devboard-frontend:sha-$SHORT_SHA

            - name: Push frontend image
              run: |
                docker push mujakkirpathan/devboard-frontend:latest
                docker push mujakkirpathan/devboard-frontend:sha-$SHORT_SHA
                

    backend:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v4

            - name: Build backend Docker Image
              run: docker build -t backend-devboard-actions devboard/backend/.

            - name: Log in to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_TOKEN }}

            - name: Get short commit SHA
              run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

            - name: Tag backend image
              run: |
                docker tag backend-devboard-actions mujakkirpathan/devboard-backend:latest
                docker tag backend-devboard-actions mujakkirpathan/devboard-backend:sha-$SHORT_SHA

            - name: Push backend image
              run: |
                docker push mujakkirpathan/devboard-backend:latest
                docker push mujakkirpathan/devboard-backend:sha-$SHORT_SHA