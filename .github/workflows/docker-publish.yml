name: Docker Publish

on: 
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout the code
              uses: actions/checkout@v4
            
            - name: Build Docker Images
              run: |
                docker build -t frontend-devboard-actions devboard/frontend/.
                docker build -t backend-devboard-actions devboard/backend/.