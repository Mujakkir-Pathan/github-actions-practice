name: smart-pipeline
on:
  push:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: lint
              run: echo "Running lint..."
    test:
        runs-on: ubuntu-latest
        steps:
            - name: tests
              run: echo "Running... tests" 
    summary:
        runs-on: ubuntu-latest
        needs:
            - lint
            - test
        steps:
            - name: summary
              run: echo "Running... summary"

            - name: checks branch
              if: github.ref == 'refs/heads/main'
              run: echo "This is a main branch push."

            - name: checks 2nd time branch
              if: github.ref != 'refs/heads/main'
              run: echo "This is a not main branch push."

            - name: Print commit message
              run: echo "Commit message:${{ github.event.commits[0].message }}"
            
              