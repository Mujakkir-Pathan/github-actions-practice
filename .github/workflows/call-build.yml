name: caller-build

on: 
    push:
        branches: [main]

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  show-version:
    needs: build
    runs-on: ubuntu-latest
    steps:
        - name: Print build version
          run: |
            echo "${{ needs.build.outputs.build_version }}"