name: smart-triggers

on:
  push:
    paths:
      - 'src/**'
      - 'app/**'

jobs:
    path-filter-check:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
              
            - name: Print Trigger Message
              run: |
                echo "Workflow triggered because src/ or app/ changed."