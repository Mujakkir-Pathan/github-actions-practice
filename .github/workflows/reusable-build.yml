name: reusable-build

on: 
    workflow_call:
        inputs: 
            app_name:
                type: string
                required: true

            environment: 
                type: string
                required: true
                default: staging
        
        secrets: 
            docker_token: 
                required: true

        outputs:
            build_version:
                description: Build version generated by the workflow
                value: ${{ jobs.build.outputs.build_version }}


jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
            build_version:
                value: ${{ steps.version.outputs.build_version }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Print build information
              run: echo "Building ${{ inputs.app_name }}  for  ${{ inputs.environment }}"

            - name: Check Docker token
              env: 
                DOCKER_TOKEN: ${{ secrets.docker_token }}
              run: |
                if [ -n "$DOCKER_TOKEN" ]; then
                    echo "Docker token is set: true"
                else
                    echo "Docker token is set: false"
                fi

            - name: Generate build version
              id: version
              run: |
                VERSION="v1.0-${GITHUB_SHA::7}"
                echo "build_version=$VERSION" >> "$GITHUB_OUTPUT"

                                   
