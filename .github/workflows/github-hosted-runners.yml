name: self_hosted

on: 
  workflow_dispatch:
jobs:
  one:
    runs-on: ubuntu-latest
    steps: 
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$(whoami)"

  two:
    runs-on: windows-latest
    steps:
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$env:USERNAME"
  three:
    runs-on: macos-latest
    steps:
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$(id -un)"