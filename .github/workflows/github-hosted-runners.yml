name: self_hosted

on: 
  workflow_dispatch:
jobs:
  one:
    runs-on: ubuntu-latest
    steps: 
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$(whoami)"

  two:
    runs-on: windows-latest
    steps:
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$env:USERNAME"
  three:
    runs-on: macos-latest
    steps:
      - name: print os name
        run: echo "${{ runner.os }}"

      - name: Print Hostname
        run: hostname

      - name: Print Current User
        run: echo "Current User:$(id -un)"

  version:
    runs-on: ubuntu-latest
    steps:
    - name: Print Software Versions
      run: |
        echo "Docker version: $(docker --version)"
        echo "Python version: $(python3 --version)"
        echo "Node version: $(node --version)"
        echo "Git version: $(git --version)"