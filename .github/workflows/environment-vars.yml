name: environment

on: 
    workflow_dispatch:
env:
    APP_NAME: myapp

jobs:
    vars:
        runs-on: [self-hosted, my-linux-server]

        env:
            ENVIRONMENT: staging

        steps:   
        - name: print 3 types of variables
          env:
                VERSION: 1.0.0
          run: |
            echo "APP_NAME: $APP_NAME"
            echo "ENVIRONMENT: $ENVIRONMENT"
            echo "VERSION: $VERSION"
            echo "Commit SHA: ${{ github.sha }}"
            echo "Triggered by: ${{ github.actor }}"
        
    