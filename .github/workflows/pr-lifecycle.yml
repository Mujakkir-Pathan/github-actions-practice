name: pr-cycle
on: 
    pull_request:
        types:
            - opened 
            - synchronize 
            - reopened 
            - closed

jobs:
    pr-info:
        runs-on: ubuntu-latest
        steps:
            - name: Print Event Action
              run: echo "fired event type= ${{ github.event.action }}"

            - name: Print PR Title
              run: echo "PR title= ${{ github.event.pull_request.title }}"

            - name: Print PR Author
              run: echo "PR author= ${{ github.event.pull_request.user.login }}"

            - name: Print Branch Information
              run: |
                echo "Source branch= ${{ github.head_ref }}"
                echo "Target branch= ${{ github.base_ref }}"

            - name: Check If PR Was Merged
              if: github.event.pull_request.merged == true
              run: echo "This PR was successfully merged into the target branch!"