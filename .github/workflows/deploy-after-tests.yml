name: Deploy After Tests
on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]

jobs:
    deploy:
        runs-on: ubuntu-latest    
        steps:

            - name: Print Warning Message
              if: ${{ github.event.workflow_run.conclusion != 'success' }}
              run: |
                echo "::warning::Tests failed. Deployment will not proceed."
                exit 1

            - name: Print Deployment Message
              if: ${{ github.event.workflow_run.conclusion == 'success' }}
              run: |
                echo "Deploy workflow triggered."
              